<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Six Thinking Hats - 作業狀況統計</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #17171e;
    --surface2: #1e1e28;
    --surface3: #252532;
    --border: #2e2e3d;
    --border2: #3a3a50;
    --text: #e8e8f0;
    --text2: #9898b0;
    --text3: #5a5a75;
    --accent: #6c63ff;
    --accent2: #8b83ff;
    --accent-glow: rgba(108,99,255,0.25);
    --hat-white: #e8e8f0;
    --hat-red: #ff5c5c;
    --hat-black: #4a4a60;
    --hat-yellow: #ffd166;
    --hat-green: #06d6a0;
    --hat-blue: #118ab2;
    --success: #06d6a0;
    --warning: #ffd166;
    --danger: #ff5c5c;
    --radius: 10px;
    --radius-lg: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── LAYOUT ─── */
  .app { display: flex; min-height: 100vh; transition: all 0.3s; }

  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    z-index: 100;
    overflow-y: auto;
    transition: all 0.3s;
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .sidebar-logo .subtitle {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }

  .nav-section {
    padding: 16px 12px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    margin: 1px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text2);
    transition: all 0.15s;
    user-select: none;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-glow); color: var(--accent2); font-weight: 600; }
  .nav-item .nav-icon { width: 18px; text-align: center; font-size: 14px; flex-shrink: 0; }

  .main {
    margin-left: 220px;
    flex: 1;
    padding: 32px;
    min-height: 100vh;
    transition: all 0.3s;
  }

  /* ─── PAGE HEADER ─── */
  .page-header {
    margin-bottom: 28px;
  }
  .page-header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
  }
  .page-header p {
    color: var(--text2);
    font-size: 13.5px;
    margin-top: 4px;
  }

  /* ─── PANELS ─── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px;
    margin-bottom: 20px;
  }

  /* ─── BUTTONS ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface3); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); color: var(--text); }
  .btn-danger { background: rgba(255,92,92,0.15); color: var(--danger); border: 1px solid rgba(255,92,92,0.3); }
  .btn-danger:hover { background: rgba(255,92,92,0.25); }
  .btn-success { background: rgba(6,214,160,0.15); color: var(--success); border: 1px solid rgba(6,214,160,0.3); }
  .btn-success:hover { background: rgba(6,214,160,0.25); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 6px; }

  /* ─── INPUTS ─── */
  input[type=text], input[type=date], input[type=url], input[type=number], select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }

  /* ─── TABLE ─── */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  /* ─── CHECKBOX ─── */
  .check-box {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border2);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .check-box.checked { background: var(--success); border-color: var(--success); color: #fff; font-size: 13px; }

  /* ─── SCORE INPUT ─── */
  .score-input { width: 70px; text-align: center; padding: 5px; border-radius: 6px; }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 28px;
    width: 90vw;
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
  }

  /* ─── DISPLAY PAGE ─── */
  .display-page {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 500;
    overflow-y: auto;
    display: none;
    padding: 40px;
  }
  .display-page.open { display: block; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

  .hide-for-assistant { display: block; }
  body.assistant-mode .hide-for-assistant { display: none !important; }
  body.assistant-mode .main { margin-left: 180px; }
  body.assistant-mode .sidebar { width: 180px; }

</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="title">Six Thinking Hats</div>
      <div class="subtitle">作業狀況統計系統</div>
    </div>
    
    <div class="nav-section hide-for-assistant">設定</div>
    <div class="nav-item active hide-for-assistant" data-page="setup-students" onclick="navigate(this)">
      <span class="nav-icon">S</span> 學生名單
    </div>
    <div class="nav-item hide-for-assistant" data-page="setup-groups" onclick="navigate(this)">
      <span class="nav-icon">G</span> 組別設定
    </div>
    <div class="nav-item hide-for-assistant" data-page="setup-assignments" onclick="navigate(this)">
      <span class="nav-icon">A</span> 作業設定
    </div>
    
    <div class="nav-section">管理</div>
    <div class="nav-item" data-page="records" onclick="navigate(this)" id="nav-records">
      <span class="nav-icon">R</span> 繳交紀錄
    </div>
    <div class="nav-item" data-page="attendance" onclick="navigate(this)">
      <span class="nav-icon">At</span> 出席登記
    </div>
    <div class="nav-item hide-for-assistant" data-page="scores" onclick="navigate(this)">
      <span class="nav-icon">Sc</span> 評分管理
    </div>
    
    <div class="nav-section hide-for-assistant">報表</div>
    <div class="nav-item hide-for-assistant" onclick="openDisplay()">
      <span class="nav-icon">D</span> 展示預覽頁
    </div>

    <div style="flex:1"></div>
    <div class="hide-for-assistant" style="padding:12px 16px; border-top:1px solid var(--border);">
      <button class="btn btn-secondary btn-xs" onclick="exportData()">備份</button>
      <button class="btn btn-danger btn-xs" onclick="clearAll()">清除</button>
    </div>
  </aside>

  <main class="main">
    <div id="page-setup-students" class="page">
      <div class="page-header"><h1>學生名單</h1></div>
      <div class="panel">
        <div style="display:flex; gap:10px;">
          <input type="text" id="newStudentName" placeholder="姓名">
          <input type="text" id="newStudentId" placeholder="座號">
          <button class="btn btn-primary btn-sm" onclick="addStudent()">+ 新增</button>
          <button class="btn btn-secondary btn-sm" onclick="openModal('bulkModal')">批次匯入</button>
        </div>
      </div>
      <div class="panel">
        <div class="table-wrap">
          <table>
            <thead><tr><th>座號</th><th>姓名</th><th>組別</th><th>操作</th></tr></thead>
            <tbody id="studentTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="page-setup-groups" class="page" style="display:none">
      <div class="page-header"><h1>組別設定</h1></div>
      <div class="panel">
        <input type="text" id="newGroupName" placeholder="組別名稱 (e.g. 第一組)" style="width:200px">
        <button class="btn btn-primary btn-sm" onclick="addGroup()">+ 新增組別</button>
      </div>
      <div id="groupCards" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px;"></div>
    </div>

    <div id="page-setup-assignments" class="page" style="display:none">
      <div class="page-header"><h1>作業設定</h1></div>
      <div class="panel">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
          <input type="text" id="newAssignName" placeholder="作業名稱">
          <select id="newAssignScoreMode">
            <option value="group">小組評分 (同組同分)</option>
            <option value="individual">個人評分</option>
          </select>
          <input type="number" id="newAssignMaxScore" value="100" placeholder="滿分">
          <button class="btn btn-primary" onclick="addAssignment()">+ 新增作業</button>
        </div>
      </div>
      <div class="panel" id="assignmentList"></div>
    </div>

    <div id="page-records" class="page" style="display:none">
      <div class="page-header"><h1>繳交紀錄</h1></div>
      <div class="panel">
        <div class="table-wrap">
          <table id="recordsTable">
            <thead><tr id="recordsHead"></tr></thead>
            <tbody id="recordsBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="page-scores" class="page hide-for-assistant" style="display:none">
      <div class="page-header">
        <h1>評分管理</h1>
        <p>選擇作業後，輸入小組或個人分數。</p>
      </div>
      <div class="panel">
        <select id="scoreAssignSelect" onchange="renderScores()" style="margin-bottom:16px;"></select>
        <div id="scoresContent"></div>
      </div>
    </div>

    <div id="page-attendance" class="page" style="display:none">
        <div class="page-header"><h1>出席登記</h1></div>
        <div class="panel">
            <input type="date" id="newAttDate">
            <button class="btn btn-primary btn-sm" onclick="addAttDate()">新增日期</button>
        </div>
        <div class="panel">
            <div class="table-wrap">
                <table id="attendanceTable">
                    <thead><tr id="attendanceHead"></tr></thead>
                    <tbody id="attendanceBody"></tbody>
                </table>
            </div>
        </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="bulkModal">
  <div class="modal">
    <h3>批次匯入學生</h3>
    <textarea id="bulkText" rows="10" style="width:100%; margin-top:10px;" placeholder="01 王小明&#10;02 李小美"></textarea>
    <button class="btn btn-primary" onclick="doBulkImport()">匯入</button>
    <button class="btn btn-secondary" onclick="closeModal('bulkModal')">取消</button>
  </div>
</div>

<div class="modal-overlay" id="adjModal">
    <div class="modal">
      <h3 id="adjModalTitle">個別調整分數</h3>
      <div id="adjModalContent" style="margin:15px 0;"></div>
      <button class="btn btn-primary" onclick="closeModal('adjModal')">確定</button>
    </div>
</div>

<div class="display-page" id="displayPage">
    <button class="btn btn-secondary" onclick="closeDisplay()" style="position:fixed;top:20px;right:20px;">關閉</button>
    <h1 style="text-align:center; margin-bottom:20px;">班級總表</h1>
    <div id="displayContent"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  CORE STATE
// ══════════════════════════════════════════════════════════
let state = {
  students: [],
  groups: [],
  assignments: [],
  records: {},
  scores: {},      
  adjustments: {}, 
  attendance: {},
  attendanceDates: []
};

function save() { localStorage.setItem('sixhats_v5', JSON.stringify(state)); }

function load() {
  try {
    const d = localStorage.getItem('sixhats_v5');
    if (d) {
      const parsed = JSON.parse(d);
      state.students = parsed.students || [];
      state.groups = parsed.groups || [];
      state.assignments = parsed.assignments || [];
      state.records = parsed.records || {};
      state.scores = parsed.scores || {};
      state.adjustments = parsed.adjustments || {};
      state.attendance = parsed.attendance || {};
      state.attendanceDates = parsed.attendanceDates || [];
    }
  } catch (e) {
    console.error("讀取儲存資料失敗，重置為預設狀態", e);
  }
}

// 初始讀取
load();

function uid() { return '_' + Math.random().toString(36).slice(2, 9); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ══════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════
function navigate(el) {
  load(); // 每次切換頁面強制重新讀取，確保多個分頁或錯誤後資料能同步
  
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  const pageId = 'page-' + el.dataset.page;
  document.getElementById(pageId).style.display = 'block';

  if (el.dataset.page === 'records') renderRecords();
  if (el.dataset.page === 'scores') { populateScoreSelect(); renderScores(); }
  if (el.dataset.page === 'attendance') renderAttendance();
}

// ══════════════════════════════════════════════════════════
//  STUDENTS & GROUPS
// ══════════════════════════════════════════════════════════
function addStudent() {
  const nameInput = document.getElementById('newStudentName');
  const seatInput = document.getElementById('newStudentId');
  const name = nameInput.value.trim();
  const seatNo = seatInput.value.trim();
  
  if(!name || !seatNo) return;
  state.students.push({ id: uid(), name, seatNo, groupId: null });
  state.students.sort((a,b) => parseInt(a.seatNo) - parseInt(b.seatNo));
  save(); 
  renderStudentTable();
  
  nameInput.value = '';
  seatInput.value = '';
}

function renderStudentTable() {
  const tbody = document.getElementById('studentTable');
  tbody.innerHTML = state.students.map(s => {
    const grpOpts = `<option value="">未分組</option>` + state.groups.map(g => `<option value="${g.id}" ${s.groupId===g.id?'selected':''}>${g.name}</option>`).join('');
    return `<tr>
      <td>${s.seatNo}</td>
      <td>${s.name}</td>
      <td><select onchange="updateSGroup('${s.id}', this.value)">${grpOpts}</select></td>
      <td><button class="btn btn-danger btn-xs" onclick="delStudent('${s.id}')">刪除</button></td>
    </tr>`;
  }).join('');
}

function updateSGroup(sid, gid) { 
  state.students.find(s => s.id === sid).groupId = gid || null; 
  save(); 
}

function delStudent(id) { 
    state.students = state.students.filter(s=>s.id!==id); 
    // 清除該學生的相關資料
    for(let aid in state.records) delete state.records[aid][id];
    for(let aid in state.scores) if(state.assignments.find(a=>a.id===aid)?.scoreMode !== 'group') delete state.scores[aid][id];
    for(let aid in state.adjustments) delete state.adjustments[aid][id];
    for(let d in state.attendance) delete state.attendance[d][id];
    save(); 
    renderStudentTable(); 
}

function doBulkImport() {
  const text = document.getElementById('bulkText').value;
  text.split('\n').forEach(line => {
    const p = line.trim().split(/\s+/);
    if(p.length >= 2) state.students.push({ id: uid(), name: p[1], seatNo: p[0], groupId: null });
  });
  state.students.sort((a,b) => parseInt(a.seatNo) - parseInt(b.seatNo));
  save(); 
  closeModal('bulkModal'); 
  renderStudentTable();
  document.getElementById('bulkText').value = '';
}

function addGroup() {
  const nameInput = document.getElementById('newGroupName');
  const name = nameInput.value.trim();
  if(!name) return;
  state.groups.push({ id: uid(), name });
  save(); 
  renderGroupCards();
  renderStudentTable(); 
  nameInput.value = '';
}

function renderGroupCards() {
    document.getElementById('groupCards').innerHTML = state.groups.map(g => `
        <div class="panel">
            <strong>${g.name}</strong>
            <button class="btn btn-danger btn-xs" style="margin-left:10px" onclick="delGroup('${g.id}')">刪除</button>
        </div>
    `).join('');
}

function delGroup(id) { 
    state.groups = state.groups.filter(g=>g.id!==id); 
    state.students.forEach(s => { if(s.groupId === id) s.groupId = null; });
    for(let aid in state.scores) delete state.scores[aid][id]; // 清除群組分數
    save(); 
    renderGroupCards(); 
    renderStudentTable();
}

// ══════════════════════════════════════════════════════════
//  ASSIGNMENTS
// ══════════════════════════════════════════════════════════
function addAssignment() {
  const nameInput = document.getElementById('newAssignName');
  const modeInput = document.getElementById('newAssignScoreMode');
  const maxInput = document.getElementById('newAssignMaxScore');
  
  const name = nameInput.value.trim();
  const scoreMode = modeInput.value;
  const max = maxInput.value;
  
  if(!name) return;
  state.assignments.push({ id: uid(), name, scoreMode, maxScore: max });
  save(); 
  renderAssignList();
  
  nameInput.value = '';
  maxInput.value = '100';
}

function renderAssignList() {
    document.getElementById('assignmentList').innerHTML = state.assignments.map(a => `
        <div style="padding:10px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <span>${a.name} (${a.scoreMode==='group'?'小組':'個人'}) - 滿分 ${a.maxScore}</span>
            <button class="btn btn-danger btn-xs" onclick="delAssign('${a.id}')">刪除</button>
        </div>
    `).join('');
}

function delAssign(id) { 
    state.assignments = state.assignments.filter(a=>a.id!==id); 
    // 清除該作業相關分數與紀錄
    delete state.scores[id];
    delete state.adjustments[id];
    delete state.records[id];
    save(); 
    renderAssignList(); 
}

// ══════════════════════════════════════════════════════════
//  RECORDS (繳交)
// ══════════════════════════════════════════════════════════
function renderRecords() {
    const head = document.getElementById('recordsHead');
    const body = document.getElementById('recordsBody');
    head.innerHTML = '<th>學生</th>' + state.assignments.map(a => `<th>${a.name}</th>`).join('');
    
    body.innerHTML = state.students.map(s => {
        const cells = state.assignments.map(a => {
            const status = (state.records[a.id] || {})[s.id] || 'none';
            return `<td><div class="check-box ${status==='checked'?'checked':''}" onclick="toggleRec('${a.id}','${s.id}')">${status==='checked'?'V':''}</div></td>`;
        }).join('');
        return `<tr><td>${s.seatNo} ${s.name}</td>${cells}</tr>`;
    }).join('');
}

function toggleRec(aid, sid) {
    if(!state.records[aid]) state.records[aid] = {};
    state.records[aid][sid] = state.records[aid][sid] === 'checked' ? 'none' : 'checked';
    save(); renderRecords();
}

// ══════════════════════════════════════════════════════════
//  SCORES (評分管理)
// ══════════════════════════════════════════════════════════
function populateScoreSelect() {
    const sel = document.getElementById('scoreAssignSelect');
    if (!sel) return;
    
    if (state.assignments.length === 0) {
        sel.innerHTML = '<option value="" disabled selected>尚無作業</option>';
    } else {
        // 加入一個預設佔位選項，強制使用者發生切換動作，解決 onchange 不觸發的問題
        sel.innerHTML = '<option value="" disabled selected>請選擇作業...</option>' + 
            state.assignments.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    }
}

function renderScores() {
    const selectEl = document.getElementById('scoreAssignSelect');
    const container = document.getElementById('scoresContent');
    
    if(!selectEl || state.assignments.length === 0) {
        container.innerHTML = "<p style='color:var(--text2);'>請先至「設定 > 作業設定」建立作業</p>"; 
        return; 
    }

    const aid = selectEl.value;
    if(!aid) {
        container.innerHTML = "<p style='color:var(--text2);'>請從上方下拉選單選擇一項作業以進行評分。</p>";
        return;
    }

    const assign = state.assignments.find(a => a.id === aid);
    if(!assign) return;

    let html = '';
    if(assign.scoreMode === 'group') {
        html = `<h3>小組評分模式 (輸入組分將自動套用至全組)</h3>
        <div class="table-wrap" style="margin-top:12px;"><table>
            <thead><tr><th>組別</th><th>分數</th><th>操作</th></tr></thead>
            <tbody>` + state.groups.map(g => {
                let score = (state.scores[aid] || {})[g.id];
                const displayScore = (score !== undefined && score !== null) ? score : '';
                return `<tr>
                    <td>${g.name}</td>
                    <td><input type="number" class="score-input" value="${displayScore}" onchange="setScore('${aid}','${g.id}',this.value)"></td>
                    <td><button class="btn btn-secondary btn-xs" onclick="openAdj('${aid}','${g.id}')">組員加扣分</button></td>
                </tr>`;
            }).join('') + `</tbody></table></div>`;
    } else {
        html = `<h3>個人評分模式</h3>
        <div class="table-wrap" style="margin-top:12px;"><table>
            <thead><tr><th>座號</th><th>姓名</th><th>分數</th></tr></thead>
            <tbody>` + state.students.map(s => {
                let score = (state.scores[aid] || {})[s.id];
                const displayScore = (score !== undefined && score !== null) ? score : '';
                return `<tr>
                    <td>${s.seatNo}</td>
                    <td>${s.name}</td>
                    <td><input type="number" class="score-input" value="${displayScore}" onchange="setScore('${aid}','${s.id}',this.value)"></td>
                </tr>`;
            }).join('') + `</tbody></table></div>`;
    }
    container.innerHTML = html;
}

function setScore(aid, entityId, val) {
    if(!state.scores[aid]) state.scores[aid] = {};
    if(val.trim() === '') {
        delete state.scores[aid][entityId]; 
    } else {
        state.scores[aid][entityId] = parseFloat(val);
    }
    save();
}

function openAdj(aid, gid) {
    const members = state.students.filter(s => s.groupId === gid);
    const container = document.getElementById('adjModalContent');
    container.innerHTML = members.map(s => {
        let adj = (state.adjustments[aid] || {})[s.id];
        const displayAdj = (adj !== undefined && adj !== null) ? adj : 0;
        return `<div style="margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
            <span>${s.seatNo} ${s.name}</span>
            <input type="number" class="score-input" placeholder="加減分" value="${displayAdj}" onchange="setAdj('${aid}','${s.id}',this.value)">
        </div>`;
    }).join('');
    openModal('adjModal');
}

function setAdj(aid, sid, val) {
    if(!state.adjustments[aid]) state.adjustments[aid] = {};
    if(val.trim() === '') {
        delete state.adjustments[aid][sid];
    } else {
        state.adjustments[aid][sid] = parseFloat(val);
    }
    save();
}

// ══════════════════════════════════════════════════════════
//  ATTENDANCE
// ══════════════════════════════════════════════════════════
function addAttDate() {
    const dInput = document.getElementById('newAttDate');
    const d = dInput.value;
    if(!d || state.attendanceDates.includes(d)) return;
    state.attendanceDates.push(d);
    state.attendanceDates.sort();
    save(); 
    renderAttendance();
    dInput.value = '';
}

function renderAttendance() {
    const head = document.getElementById('attendanceHead');
    const body = document.getElementById('attendanceBody');
    head.innerHTML = '<th>學生</th>' + state.attendanceDates.map(d => `<th>${d}</th>`).join('');
    body.innerHTML = state.students.map(s => {
        const cells = state.attendanceDates.map(d => {
            const status = (state.attendance[d] || {})[s.id] || 'none';
            return `<td><div class="check-box ${status==='checked'?'checked':''}" onclick="toggleAtt('${d}','${s.id}')">${status==='checked'?'V':''}</div></td>`;
        }).join('');
        return `<tr><td>${s.seatNo} ${s.name}</td>${cells}</tr>`;
    }).join('');
}

function toggleAtt(d, sid) {
    if(!state.attendance[d]) state.attendance[d] = {};
    state.attendance[d][sid] = state.attendance[d][sid] === 'checked' ? 'none' : 'checked';
    save(); renderAttendance();
}

// ══════════════════════════════════════════════════════════
//  DISPLAY & EXPORT
// ══════════════════════════════════════════════════════════
function openDisplay() {
    load(); // 開啟報表前確保讀取最新資料
    const c = document.getElementById('displayContent');
    c.innerHTML = `<table>
        <thead><tr><th>座號</th><th>姓名</th>${state.assignments.map(a=>`<th>${a.name}</th>`).join('')}<th>總分</th></tr></thead>
        <tbody>` + state.students.map(s => {
            let total = 0;
            const cells = state.assignments.map(a => {
                let score = 0;
                if(a.scoreMode === 'group') {
                    let rawScore = (state.scores[a.id] || {})[s.groupId];
                    score = (rawScore !== undefined && rawScore !== null) ? rawScore : 0;
                } else {
                    let rawScore = (state.scores[a.id] || {})[s.id];
                    score = (rawScore !== undefined && rawScore !== null) ? rawScore : 0;
                }
                
                let rawAdj = (state.adjustments[a.id] || {})[s.id];
                const adj = (rawAdj !== undefined && rawAdj !== null) ? rawAdj : 0;
                
                const final = score + adj;
                total += final;
                return `<td>${final}</td>`;
            }).join('');
            return `<tr><td>${s.seatNo}</td><td>${s.name}</td>${cells}<td>${total}</td></tr>`;
        }).join('') + `</tbody></table>`;
    document.getElementById('displayPage').classList.add('open');
}

function closeDisplay() { document.getElementById('displayPage').classList.remove('open'); }

function exportData() {
    const blob = new Blob([JSON.stringify(state)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `backup_sixhats_${new Date().getTime()}.json`;
    a.click();
}

function clearAll() { 
    if(confirm('確定清除所有資料？這將無法復原。')) { 
        localStorage.removeItem('sixhats_v5'); 
        location.reload(); 
    } 
}

// 初始渲染
renderStudentTable();
renderGroupCards();
renderAssignList();
</script>
